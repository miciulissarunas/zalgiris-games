name: Update Zalgiris Game
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: node fetch.js
      - name: Show debug
        if: always()
        run: |
          echo "=== debug.txt first 200 lines ==="
          head -200 debug.txt || echo "no debug.txt found"
      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add game.json debug.txt
          git commit -m "update game" || echo "no changes"
          git push
